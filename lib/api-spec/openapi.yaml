openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ORODIG PTS - Oro Digital Para Todos MLM Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: members
    description: Member management
  - name: earnings
    description: Earnings and commissions
  - name: dashboard
    description: Dashboard summary data
  - name: leaderboard
    description: Leaderboard rankings
  - name: products
    description: Product catalog
  - name: withdrawals
    description: Withdrawal requests
  - name: deposits
    description: Deposit requests
  - name: network
    description: Referral network tree
  - name: admin
    description: Admin-only operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new member with optional sponsor referral code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error or referral code not found

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated member profile
      responses:
        "200":
          description: Current member profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "401":
          description: Unauthorized

  /auth/profile:
    put:
      operationId: updateProfile
      tags: [auth]
      summary: Update current member profile (name, email, phone, password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "400":
          description: Validation error or wrong current password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout and destroy session
      responses:
        "200":
          description: Logged out

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get aggregated dashboard summary for the current member
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getDashboardActivity
      tags: [dashboard]
      summary: Get recent activity feed for the current member
      responses:
        "200":
          description: Recent activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Member not found

  /members/{id}/network:
    get:
      operationId: getMemberNetwork
      tags: [network]
      summary: Get referral network tree for a member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Network tree node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkNode"

  /members/{id}/earnings:
    get:
      operationId: getMemberEarnings
      tags: [earnings]
      summary: Get earnings history for a member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Earnings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Earning"

  /earnings:
    get:
      operationId: listEarnings
      tags: [earnings]
      summary: List all earnings for the current member
      responses:
        "200":
          description: Earnings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Earning"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [leaderboard]
      summary: Get top earners leaderboard
      responses:
        "200":
          description: Leaderboard rankings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all available products
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /purchases:
    get:
      operationId: listPurchases
      tags: [products]
      summary: List purchase history for the current member
      responses:
        "200":
          description: Purchase history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Purchase"
    post:
      operationId: createPurchase
      tags: [products]
      summary: Record a product purchase (deducts balance, earns points + cashback)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseInput"
      responses:
        "201":
          description: Purchase recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"
        "400":
          description: Insufficient balance

  /withdrawals:
    get:
      operationId: listWithdrawals
      tags: [withdrawals]
      summary: List withdrawal requests for the current member
      responses:
        "200":
          description: Withdrawal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Withdrawal"
    post:
      operationId: createWithdrawal
      tags: [withdrawals]
      summary: Request a withdrawal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"
        "400":
          description: Insufficient balance or invalid amount

  /deposits:
    get:
      operationId: listDeposits
      tags: [deposits]
      summary: List deposit requests for the current member
      responses:
        "200":
          description: Deposit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [deposits]
      summary: Request/notify a new deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositInput"
      responses:
        "201":
          description: Deposit requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"
        "400":
          description: Validation error or invalid amount

  /network/my:
    get:
      operationId: getMyNetwork
      tags: [network]
      summary: Get the current member's own referral network tree
      responses:
        "200":
          description: Network tree node
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkNode"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Admin - platform-wide stats
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/withdrawals:
    get:
      operationId: adminListWithdrawals
      tags: [admin]
      summary: Admin - list all withdrawals with member info
      responses:
        "200":
          description: All withdrawals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminWithdrawal"

  /admin/withdrawals/{id}:
    patch:
      operationId: adminUpdateWithdrawal
      tags: [admin]
      summary: Admin - approve, reject or mark paid a withdrawal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminWithdrawalUpdate"
      responses:
        "200":
          description: Withdrawal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /admin/deposits:
    get:
      operationId: adminListDeposits
      tags: [admin]
      summary: Admin - list all deposits with member info
      responses:
        "200":
          description: All deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminDeposit"

  /admin/deposits/{id}:
    patch:
      operationId: adminUpdateDeposit
      tags: [admin]
      summary: Admin - approve or reject a deposit
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminDepositUpdate"
      responses:
        "200":
          description: Deposit updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /admin/purchases:
    get:
      operationId: adminListPurchases
      tags: [admin]
      summary: Admin - list all purchases with member info
      responses:
        "200":
          description: All purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminPurchase"

  /admin/purchases/{id}:
    patch:
      operationId: adminUpdatePurchase
      tags: [admin]
      summary: Admin - approve or reject a purchase
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminPurchaseUpdate"
      responses:
        "200":
          description: Purchase updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Purchase"

  /admin/products:
    get:
      operationId: adminListProducts
      tags: [admin]
      summary: Admin - list all products including inactive
      responses:
        "200":
          description: All products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: adminCreateProduct
      tags: [admin]
      summary: Admin - create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /admin/products/{id}:
    patch:
      operationId: adminUpdateProduct
      tags: [admin]
      summary: Admin - update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: adminDeleteProduct
      tags: [admin]
      summary: Admin - delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /admin/members:
    get:
      operationId: adminListMembers
      tags: [admin]
      summary: Admin - list all members with full stats
      responses:
        "200":
          description: All members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"

  /admin/members/{id}:
    patch:
      operationId: adminUpdateMember
      tags: [admin]
      summary: Admin - update member rank, status or balance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminMemberUpdate"
      responses:
        "200":
          description: Member updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [username, password, fullName, email]
      properties:
        username:
          type: string
          minLength: 3
        password:
          type: string
          minLength: 6
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: ["string", "null"]
        referralCode:
          type: ["string", "null"]

    UpdateProfileInput:
      type: object
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: ["string", "null"]
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    AuthResponse:
      type: object
      required: [member, token]
      properties:
        member:
          $ref: "#/components/schemas/Member"
        token:
          type: string

    Member:
      type: object
      required: [id, username, fullName, email, referralCode, rank, balance, points, totalEarnings, directReferrals, totalNetwork, isActive, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        referralCode:
          type: string
        rank:
          type: string
          enum: [Bronce, Cobre, Crisolito, "Belirio Rojo", "Tanzanita Verde", Plata, Oro, "Esmeralda Azul", "Esmeralda Verde", "Diamante Azul", "Danzanita Verde", "Diamante Fantasía", "Zafiro Amarillo", "Alejandrita Especial", "Accionista ORODIG"]
        balance:
          type: number
        points:
          type: number
        totalEarnings:
          type: number
        directReferrals:
          type: integer
        totalNetwork:
          type: integer
        isActive:
          type: boolean
        sponsorId:
          type: ["integer", "null"]
        sponsorName:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        lastPaymentAt:
          type: ["string", "null"]
          format: date-time
        referralStatus:
          type: string
          enum: [VERDE, AMARILLO, ROJO, SUSPENDIDO]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        activatedAt:
          type: ["string", "null"]
          format: date-time
        lastRepurchaseAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    DashboardSummary:
      type: object
      required: [balance, points, totalEarnings, directReferrals, totalNetwork, rank, earningsByType, monthlyEarnings]
      properties:
        balance:
          type: number
        points:
          type: number
        totalEarnings:
          type: number
        directReferrals:
          type: integer
        totalNetwork:
          type: integer
        rank:
          type: string
        earningsByType:
          $ref: "#/components/schemas/EarningsByType"
        monthlyEarnings:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyEarning"

    EarningsByType:
      type: object
      required: [referral, sales, purchases, leadership, work, passive]
      properties:
        referral:
          type: number
        sales:
          type: number
        purchases:
          type: number
        leadership:
          type: number
        work:
          type: number
        passive:
          type: number

    MonthlyEarning:
      type: object
      required: [month, amount]
      properties:
        month:
          type: string
        amount:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, amount, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        amount:
          type: number
        createdAt:
          type: string
          format: date-time

    Earning:
      type: object
      required: [id, memberId, type, description, amount, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        type:
          type: string
          enum: [referral, sales, purchases, leadership, work, passive]
        description:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, confirmed, paid]
        relatedMemberId:
          type: ["integer", "null"]
        relatedMemberName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    NetworkNode:
      type: object
      required: [id, fullName, username, rank, referralCode, directReferrals, totalEarnings, isActive, level, children]
      properties:
        id:
          type: integer
        fullName:
          type: string
        username:
          type: string
        rank:
          type: string
        referralCode:
          type: string
        directReferrals:
          type: integer
        totalEarnings:
          type: number
        isActive:
          type: boolean
        level:
          type: integer
        avatarUrl:
          type: ["string", "null"]
        children:
          type: array
          items:
            $ref: "#/components/schemas/NetworkNode"

    LeaderboardEntry:
      type: object
      required: [rank, memberId, fullName, username, totalEarnings, directReferrals, memberRank, avatarUrl]
      properties:
        rank:
          type: integer
        memberId:
          type: integer
        fullName:
          type: string
        username:
          type: string
        totalEarnings:
          type: number
        directReferrals:
          type: integer
        memberRank:
          type: string
        avatarUrl:
          type: ["string", "null"]

    Product:
      type: object
      required: [id, name, description, price, pointsReward, category, isActive]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        pointsReward:
          type: number
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    ProductInput:
      type: object
      required: [name, description, price, pointsReward, category]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        pointsReward:
          type: number
        category:
          type: string
        imageUrl:
          type: ["string", "null"]
        isActive:
          type: boolean

    PurchaseInput:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          minimum: 1

    Purchase:
      type: object
      required: [id, memberId, productId, productName, quantity, totalPrice, pointsEarned, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        totalPrice:
          type: number
        pointsEarned:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time

    Withdrawal:
      type: object
      required: [id, memberId, amount, method, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, paid]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    WithdrawalInput:
      type: object
      required: [amount, method]
      properties:
        amount:
          type: number
          minimum: 10
        method:
          type: string
        accountDetails:
          type: ["string", "null"]

    AdminWithdrawal:
      type: object
      required: [id, memberId, memberName, memberUsername, amount, method, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        memberName:
          type: string
        memberUsername:
          type: string
        amount:
          type: number
        method:
          type: string
        accountDetails:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, paid]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminWithdrawalUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected, paid]
        notes:
          type: ["string", "null"]

    Deposit:
      type: object
      required: [id, memberId, amount, method, referenceNumber, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        amount:
          type: number
        method:
          type: string
        referenceNumber:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    DepositInput:
      type: object
      required: [amount, method, referenceNumber]
      properties:
        amount:
          type: number
          minimum: 1
        method:
          type: string
        referenceNumber:
          type: string

    AdminDeposit:
      type: object
      required: [id, memberId, memberName, memberUsername, amount, method, referenceNumber, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        memberName:
          type: string
        memberUsername:
          type: string
        amount:
          type: number
        method:
          type: string
        referenceNumber:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminDepositUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        notes:
          type: ["string", "null"]

    AdminMemberUpdate:
      type: object
      properties:
        rank:
          type: string
          enum: [Bronce, Cobre, Crisolito, "Belirio Rojo", "Tanzanita Verde", Plata, Oro, "Esmeralda Azul", "Esmeralda Verde", "Diamante Azul", "Danzanita Verde", "Diamante Fantasía", "Zafiro Amarillo", "Alejandrita Especial", "Accionista ORODIG"]
        isActive:
          type: boolean
        balance:
          type: number

    AdminStats:
      type: object
      required: [totalMembers, activeMembers, totalPaid, pendingWithdrawals, pendingAmount, totalVolume, rankBreakdown]
      properties:
        totalMembers:
          type: integer
        activeMembers:
          type: integer
        totalPaid:
          type: number
        pendingWithdrawals:
          type: integer
        pendingAmount:
          type: number
        totalVolume:
          type: number
        rankBreakdown:
          type: object
          additionalProperties:
            type: integer

    AdminPurchase:
      type: object
      required: [id, memberId, memberName, memberUsername, productId, productName, quantity, totalPrice, pointsEarned, status, createdAt]
      properties:
        id:
          type: integer
        memberId:
          type: integer
        memberName:
          type: string
        memberUsername:
          type: string
        productId:
          type: integer
        productName:
          type: string
        quantity:
          type: integer
        totalPrice:
          type: number
        pointsEarned:
          type: number
        status:
          type: string
          enum: [pending, approved, rejected]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AdminPurchaseUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        notes:
          type: ["string", "null"]
