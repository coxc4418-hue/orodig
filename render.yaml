services:
  - type: web
    name: orodig
    runtime: node
    region: oregon
    plan: free
    buildCommand: npx pnpm@10.33.2 install && npx pnpm@10.33.2 --filter @workspace/api-server run build
    startCommand: npx pnpm@10.33.2 --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
