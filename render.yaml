services:
  - type: web
    name: orodig
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.33.2 --activate && pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SESSION_SECRET
        sync: false
